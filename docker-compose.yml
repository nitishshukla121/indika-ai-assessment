version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: indika-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_postgres_password
      POSTGRES_DB: indika_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Redis for Caching & Rate Limiting (Bonus Point)
  redis:
    image: redis:7-alpine
    container_name: indika-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # 3. Your Spring Boot Backend
  backend:
    build: 
      context: . # Path to where your Dockerfile is located
      dockerfile: Dockerfile
    container_name: indika-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/indika_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=your_postgres_password
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      # Pass your API keys here so the container can access them
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENV=${PINECONE_ENV}
      - PINECONE_PROJECT_ID=${PINECONE_PROJECT_ID}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data: