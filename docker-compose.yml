services:
  indika-postgres:
    image: postgres:15-alpine
    container_name: indika-postgres
    environment:
      POSTGRES_DB: indika_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  indika-redis:
    image: redis:7-alpine
    container_name: indika-redis
    ports:
      - "6379:6379"

  indika-backend:
    build: .
    container_name: indika-backend
    ports:
      - "8080:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_ENV: ${PINECONE_ENV}
      PINECONE_PROJECT_ID: ${PINECONE_PROJECT_ID}
    depends_on:
      - indika-postgres
      - indika-redis

volumes:
  postgres_data: