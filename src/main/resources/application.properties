spring.application.name=indika-ai-assessment
server.port=8080

spring.datasource.url=jdbc:postgresql://indika-postgres:5432/indika_db
spring.datasource.username=postgres
spring.datasource.password=your_postgres_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.data.redis.host=indika-redis
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-3.5-turbo
spring.ai.openai.embedding.options.model=text-embedding-ada-002

spring.ai.vectorstore.pinecone.api-key=${PINECONE_API_KEY}
spring.ai.vectorstore.pinecone.environment=${PINECONE_ENV}
spring.ai.vectorstore.pinecone.project-id=${PINECONE_PROJECT_ID}
spring.ai.vectorstore.pinecone.index-name=indika-index

openai.api-key=${OPENAI_API_KEY}

spring.main.allow-bean-definition-overriding=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB