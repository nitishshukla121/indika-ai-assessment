# ==========================================
# SERVER & APP CONFIGURATION
# ==========================================
spring.application.name=indika-ai-assessment
server.port=8080

# ==========================================
# POSTGRESQL DATABASE
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/indika_db
spring.datasource.username=postgres
spring.datasource.password=your_postgres_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# REDIS (For Caching & Rate Limiting Bonus)
# ==========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ==========================================
# SPRING AI - GOOGLE GEMINI CONFIGURATION
# ==========================================
spring.ai.google.genai.api-key=${GEMINI_API_KEY}

# ==========================================
# SPRING AI - PINECONE VECTOR STORE
# ==========================================
spring.ai.vectorstore.pinecone.api-key=${PINECONE_API_KEY}
spring.ai.vectorstore.pinecone.environment=${PINECONE_ENV}
spring.ai.vectorstore.pinecone.project-id=${PINECONE_PROJECT_ID}
spring.ai.vectorstore.pinecone.index-name=indika-index


